<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Selvra</title>
  <style>
    :root {
      /* Färg-tema: warm-neutral. Inte rosa AI-assistant. Inte sterilt blå.
         Tone som ändras med valens. Baseline = oxiderat lin. */
      --bg: #2a2622;
      --skin-base: #e8d9c0;
      --skin-warm: #efc9a3;   /* mot positive */
      --skin-cool: #b5c3c4;   /* mot negative */
      --ink: #2a2622;
      --aura-base: rgba(232, 217, 192, 0.06);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100vh;
      width: 100vw;
      background: var(--bg);
      color: var(--skin-base);
      font-family: -apple-system, "Segoe UI", "Helvetica Neue", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .stage {
      position: relative;
      width: min(90vmin, 600px);
      aspect-ratio: 1 / 1;
    }

    .face-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Andning / baseline-närvaro ────────────────────────────
       Subtle scale-oscillation även när helt tyst. Detta är
       "minimum sign of life" — alltid på. */
    .breathing {
      animation: breathe 5.5s ease-in-out infinite;
      transform-origin: 250px 280px;
    }

    @keyframes breathe {
      0%, 100% { transform: scale(1.000); }
      50%      { transform: scale(1.014); }
    }

    /* ── Blink — random med JS, base via CSS ──────────────── */
    .eye-lid {
      transform-origin: center;
      transform: scaleY(0.05);
      transition: transform 0.12s ease-out;
    }
    .blinking .eye-lid { transform: scaleY(1); }

    /* ── Status-textraden längst ner. Vetenskaplig. ─────── */
    .telemetry {
      position: absolute;
      bottom: 12px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 0.4px;
      color: rgba(232, 217, 192, 0.42);
      font-feature-settings: "tnum" 1;
    }
    .telemetry span { padding: 0 8px; }

    /* ── Title-rad högst upp ─────────────────────────────── */
    .header {
      position: absolute;
      top: 14px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      letter-spacing: 3.2px;
      color: rgba(232, 217, 192, 0.35);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="stage">
    <div class="header">selvra</div>

    <svg
      class="face-svg breathing"
      viewBox="0 0 500 500"
      xmlns="http://www.w3.org/2000/svg"
      preserveAspectRatio="xMidYMid meet"
    >
      <!-- ─── Aura / glow ────────────────────────────────────
           Storlek + opacitet drivs av JS från metacognitive_reliability
           + event_count. Mer aktivitet → starkare aura. -->
      <defs>
        <radialGradient id="auraGradient" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="rgba(232, 217, 192, 0.18)" />
          <stop offset="60%" stop-color="rgba(232, 217, 192, 0.04)" />
          <stop offset="100%" stop-color="rgba(232, 217, 192, 0.00)" />
        </radialGradient>
      </defs>
      <circle id="aura" cx="250" cy="270" r="220" fill="url(#auraGradient)" opacity="0.6" />

      <!-- ─── Huvud (ellips) ─────────────────────────────── -->
      <ellipse
        id="head"
        cx="250" cy="280"
        rx="135" ry="170"
        fill="var(--skin-base)"
        stroke="var(--ink)"
        stroke-width="2.5"
      />

      <!-- ─── Vänster öga ───────────────────────────────── -->
      <g id="leftEye" transform="translate(195, 240)">
        <!-- vit / vitsega -->
        <ellipse cx="0" cy="0" rx="22" ry="14" fill="#fbf5ea" stroke="var(--ink)" stroke-width="2" />
        <!-- iris/pupill (förs av JS attention-vector) -->
        <g id="leftPupilGroup">
          <circle id="leftIris" cx="0" cy="0" r="11" fill="#5a4a3a" />
          <circle id="leftPupil" cx="0" cy="0" r="6" fill="var(--ink)" />
          <!-- tiny highlight för liv -->
          <circle cx="-3" cy="-3" r="1.8" fill="#fbf5ea" opacity="0.85" />
        </g>
        <!-- Lock (för blink) -->
        <ellipse class="eye-lid"
          cx="0" cy="0" rx="22" ry="14"
          fill="var(--skin-base)"
          stroke="var(--ink)" stroke-width="2"
        />
      </g>

      <!-- ─── Höger öga ─────────────────────────────────── -->
      <g id="rightEye" transform="translate(305, 240)">
        <ellipse cx="0" cy="0" rx="22" ry="14" fill="#fbf5ea" stroke="var(--ink)" stroke-width="2" />
        <g id="rightPupilGroup">
          <circle id="rightIris" cx="0" cy="0" r="11" fill="#5a4a3a" />
          <circle id="rightPupil" cx="0" cy="0" r="6" fill="var(--ink)" />
          <circle cx="-3" cy="-3" r="1.8" fill="#fbf5ea" opacity="0.85" />
        </g>
        <ellipse class="eye-lid"
          cx="0" cy="0" rx="22" ry="14"
          fill="var(--skin-base)"
          stroke="var(--ink)" stroke-width="2"
        />
      </g>

      <!-- ─── Ögonbryn (justeras av valens) ───────────────── -->
      <path id="leftBrow"
        d="M170 208 Q195 200 220 208"
        stroke="var(--ink)" stroke-width="3.5" fill="none"
        stroke-linecap="round"
      />
      <path id="rightBrow"
        d="M280 208 Q305 200 330 208"
        stroke="var(--ink)" stroke-width="3.5" fill="none"
        stroke-linecap="round"
      />

      <!-- ─── Näsa (statisk, subtle) ──────────────────────── -->
      <path
        d="M250 285 Q244 305 250 320"
        stroke="var(--ink)" stroke-width="2" fill="none"
        opacity="0.4"
      />

      <!-- ─── Mun (justeras av valens) ────────────────────── -->
      <path id="mouth"
        d="M218 365 Q250 372 282 365"
        stroke="var(--ink)" stroke-width="3.2" fill="none"
        stroke-linecap="round"
      />
    </svg>

    <!-- ── Telemetry / arkitektur-status under ansiktet ─── -->
    <div class="telemetry">
      <span id="t-events">events 0</span>·
      <span id="t-valence">val 0.00</span>·
      <span id="t-load">load 0.00</span>·
      <span id="t-arousal">arousal 0.50</span>·
      <span id="t-state">—</span>
    </div>
  </div>

  <script>
    // ─── State-polling ────────────────────────────────────────
    // Pollar selvra-brain-output/state.json. Default-path är
    // relativ till denna HTML, men kan overrid:as via ?state=PATH.
    const params = new URLSearchParams(window.location.search);
    const STATE_URL = params.get('state') || 'state.json';
    const POLL_INTERVAL_MS = 400;

    // Default-state om filen inte finns än (förste-start)
    let lastState = {
      event_count: 0,
      valence: 0.0,
      valence_just_shifted: false,
      arousal: 0.5,
      cognitive_load: 0.0,
      attention: { x: 0, y: 0 },
      workspace_items: 0,
      workspace_focus: null,
      metacognitive_reliability: 0.5,
      body_activity: 0.0,
      last_event_type: null,
    };

    async function pollState() {
      try {
        const resp = await fetch(STATE_URL + '?t=' + Date.now(), { cache: 'no-store' });
        if (!resp.ok) return;
        const newState = await resp.json();
        lastState = { ...lastState, ...newState };
        render(lastState);
      } catch (e) {
        // Fil finns inte än. Render default tystt.
      }
    }

    // ─── Render: state → SVG-attributes ────────────────────────
    function render(s) {
      // Klampa hjälpare
      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
      const v = clamp(s.valence, -1, 1);
      const load = clamp(s.cognitive_load, 0, 1);
      const arousal = clamp(s.arousal, 0, 1);
      const reliability = clamp(s.metacognitive_reliability, 0, 1);
      const att = s.attention || { x: 0, y: 0 };

      // ── Mun: valens → smile / frown
      // Konkret: y-offset på control-point av Q-curve
      // Positive valens → mungipporna går upp (lägre y, dvs hela curvan dras ner)
      // Bezier-control-point på (250, 372 + offset). Default baseline = 372.
      // Smile: y → 380 (curve går ned). Frown: y → 360 (curve går upp).
      // Anchor-punkter (218, 365) och (282, 365) också flytta lite.
      const baselineY = 368;
      const anchorY = 365 - v * 5; // mungipporna pekar upp på positive
      const controlY = baselineY + v * 14; // 372+v*14 → smile går ner (mer böjd)
      document.getElementById('mouth').setAttribute(
        'd',
        `M218 ${anchorY} Q250 ${controlY} 282 ${anchorY}`
      );

      // ── Ögonbryn: valens → höjd & vinkel
      // Positive: bryn ovanför, mjuk båge. Negative: bryn ned-inåt (sänkt mitt)
      // Modellera som Q-kurva med flyttbara endpoints
      const browY_outer = 208 - v * 4;     // ytter-ända: upp på positive
      const browY_mid = 200 + v * 6;        // mid-punkt: gör båge
      document.getElementById('leftBrow').setAttribute(
        'd', `M170 ${browY_outer} Q195 ${browY_mid} 220 ${browY_outer - v * 2}`
      );
      document.getElementById('rightBrow').setAttribute(
        'd', `M280 ${browY_outer - v * 2} Q305 ${browY_mid} 330 ${browY_outer}`
      );

      // ── Pupiller: cognitive_load → storlek (dilation)
      // Mer load = större pupill. Baseline 6 → max 10.
      // Iris också växer något: 11 → 13.
      const pupilR = 6 + load * 4;
      const irisR = 11 + load * 2;
      document.querySelectorAll('#leftPupil, #rightPupil').forEach(el =>
        el.setAttribute('r', pupilR)
      );
      document.querySelectorAll('#leftIris, #rightIris').forEach(el =>
        el.setAttribute('r', irisR)
      );

      // ── Blickriktning: attention.x/y skiftar pupil-group
      // Range: ±6px per axel (visuellt rimligt utan att gå utanför ögat)
      const gx = clamp(att.x, -1, 1) * 6;
      const gy = clamp(att.y, -1, 1) * 6;
      document.getElementById('leftPupilGroup').setAttribute(
        'transform', `translate(${gx}, ${gy})`
      );
      document.getElementById('rightPupilGroup').setAttribute(
        'transform', `translate(${gx}, ${gy})`
      );

      // ── Aura: event_count + reliability → opacitet
      // event_count > 0 → fade in. Reliability adds. Cap on opacity 1.
      const eventNorm = Math.min(1, s.event_count / 100);
      const auraOpacity = 0.2 + eventNorm * 0.4 + reliability * 0.3;
      document.getElementById('aura').setAttribute('opacity', clamp(auraOpacity, 0, 1));

      // ── Hudfärg: valens → tone-shift
      // Positive → warmer (#efc9a3). Negative → cooler (#b5c3c4).
      const skinColor = mixHex('#e8d9c0', v > 0 ? '#efc9a3' : '#b5c3c4', Math.abs(v));
      document.getElementById('head').setAttribute('fill', skinColor);
      document.querySelectorAll('.eye-lid').forEach(el =>
        el.setAttribute('fill', skinColor)
      );

      // ── Telemetry text
      document.getElementById('t-events').textContent = `events ${s.event_count}`;
      document.getElementById('t-valence').textContent = `val ${v.toFixed(2)}`;
      document.getElementById('t-load').textContent = `load ${load.toFixed(2)}`;
      document.getElementById('t-arousal').textContent = `arousal ${arousal.toFixed(2)}`;
      document.getElementById('t-state').textContent = s.last_event_type || '—';
    }

    // ── Mix två hex-färger ──────────────────────────────────
    function mixHex(c1, c2, t) {
      const a = hex2rgb(c1), b = hex2rgb(c2);
      const r = Math.round(a.r + (b.r - a.r) * t);
      const g = Math.round(a.g + (b.g - a.g) * t);
      const bl = Math.round(a.b + (b.b - a.b) * t);
      return `rgb(${r}, ${g}, ${bl})`;
    }
    function hex2rgb(h) {
      const x = h.replace('#', '');
      return {
        r: parseInt(x.substring(0, 2), 16),
        g: parseInt(x.substring(2, 4), 16),
        b: parseInt(x.substring(4, 6), 16),
      };
    }

    // ─── Random blinks ────────────────────────────────────────
    function scheduleBlink() {
      // Blink-rate beror på arousal — högre arousal = oftare blink
      const arousal = lastState.arousal || 0.5;
      const interval = 2500 + Math.random() * 4500 - arousal * 2000;
      setTimeout(() => {
        document.querySelectorAll('.eye-lid').forEach(el => {
          el.parentElement.classList.add('blinking');
        });
        setTimeout(() => {
          document.querySelectorAll('.eye-lid').forEach(el => {
            el.parentElement.classList.remove('blinking');
          });
        }, 120);
        scheduleBlink();
      }, Math.max(1200, interval));
    }

    // ─── Init ─────────────────────────────────────────────────
    render(lastState);
    setInterval(pollState, POLL_INTERVAL_MS);
    pollState();
    scheduleBlink();
  </script>
</body>
</html>
